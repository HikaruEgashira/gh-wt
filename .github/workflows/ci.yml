name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shell-lint:
    name: shell lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: bash -n (syntax)
        run: |
          set -euo pipefail
          shopt -s nullglob
          bash -n gh-wt
          for f in lib/*.sh tests/parity/run.sh tests/parity/cases/*.sh; do
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          set -euo pipefail
          shopt -s nullglob
          shellcheck --version
          shellcheck -S warning gh-wt lib/*.sh tests/parity/run.sh
          shellcheck -S warning --shell=bash tests/parity/cases/*.sh

  parity-linux:
    name: parity (OverlayFS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: probe OverlayFS
        run: |
          set -euo pipefail
          grep -qw overlay /proc/filesystems
          sudo -n true

      - name: run parity suite
        run: sudo ./tests/parity/run.sh

  macos-swift:
    name: OverlayCore tests (macOS)
    runs-on: macos-26
    timeout-minutes: 20
    defaults:
      run:
        working-directory: macos
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: swift version
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test
